name: Newman Contract Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  newman:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm


      - name: Install dependencies
        run: npm ci


      - name: Lint OpenAPI contracts
        run: npm run lint:contracts


      - name: Start IoT Prism mock
        run: |
          nohup npm run mock:iot > prism-iot.log 2>&1 &


      - name: Start AI Vision Prism mock
        run: |
          nohup npm run mock:vision > prism-vision.log 2>&1 &


      - name: Wait for mock servers
        run: |
          npx wait-on \
          tcp:4010 \
          tcp:4011 \
          --timeout 30000


      - name: Run Newman mock tests
        run: npm run test:mock


      - name: Generate HTML report
        if: always()
        run: npm run test:html


      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "===== IoT Prism ====="
          cat prism-iot.log || true

          echo "===== AI Vision Prism ====="
          cat prism-vision.log || true


      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/