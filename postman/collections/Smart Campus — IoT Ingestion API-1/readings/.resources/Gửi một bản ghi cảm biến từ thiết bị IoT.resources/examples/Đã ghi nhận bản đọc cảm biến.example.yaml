$kind: http-example
request:
  url: "{{baseUrl}}/readings"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "device_id": "<string>",
        "metric": "temperature",
        "value": "<number>",
        "timestamp": "<dateTime>",
        "unit": "boolean"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "reading_id": "<string>",
        "device_id": "<string>",
        "metric": "humidity",
        "accepted": "<boolean>",
        "created_at": "<dateTime>"
      }
order: 1000
