    device_id: <string>
    limit: "10"
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "items": [
          {
            "device_id": "<string>",
            "metric": "temperature",
            "reading_id": "<string>",
            "timestamp": "<dateTime>",
            "value": "<number>",
            "unit": "ppm"
          },
          {
            "device_id": "<string>",
            "metric": "humidity",
            "reading_id": "<string>",
            "timestamp": "<dateTime>",
            "value": "<number>",
            "unit": "boolean"
          }
        ]
      }
order: 1000
