$kind: http-example
request:
  url: "{{baseUrl}}/readings/latest?device_id=<string>&limit=10"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
