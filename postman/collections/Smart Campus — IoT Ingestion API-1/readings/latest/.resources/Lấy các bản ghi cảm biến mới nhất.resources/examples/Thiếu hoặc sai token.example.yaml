$kind: http-example
request:
  url: "{{baseUrl}}/readings/latest?device_id=<string>&limit=10"
  method: GET
  headers:
    - key: Accept
      value: application/problem+json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    device_id: <string>
    limit: "10"
  body:
    type: text
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "type": "<uri>",
        "title": "<string>",
        "status": "<integer>",
        "detail": "<string>",
        "instance": "<string>"
      }
order: 3000
