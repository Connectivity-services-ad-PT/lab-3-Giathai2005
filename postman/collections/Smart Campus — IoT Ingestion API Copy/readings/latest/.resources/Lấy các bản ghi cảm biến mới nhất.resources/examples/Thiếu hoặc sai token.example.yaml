$kind: http-example
request:
  url: "{{baseUrl}}/readings/latest?device_id=ESP32-LAB-A01&limit=5"
  method: GET
  headers:
    - key: Accept
      value: application/problem+json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    device_id: ESP32-LAB-A01
    limit: "5"
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "type": "https://smart-campus.local/problems/unauthorized",
        "title": "Unauthorized",
        "status": 401,
        "detail": "Missing or invalid bearer token",
        "instance": "/readings/latest"
      }
order: 3000
