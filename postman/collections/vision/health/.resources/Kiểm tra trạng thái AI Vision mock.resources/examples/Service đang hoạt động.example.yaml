$kind: http-example
request:
  url: "{{baseUrl}}/health"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "ok",
        "service": "ai-vision",
        "version": "0.3.0"
      }
order: 1000
