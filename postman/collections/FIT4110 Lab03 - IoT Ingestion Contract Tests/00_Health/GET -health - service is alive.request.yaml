$kind: http-request
name: GET /health - service is alive
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Response has valid health fields", function () {

          const json = pm.response.json();

          pm.expect(json).to.have.property("status");
          pm.expect(json.status).to.eql("ok");

          pm.expect(json).to.have.property("service");
          pm.expect(json.service).to.eql("iot-ingestion");

          pm.expect(json).to.have.property("version");

      });
    language: text/javascript
order: 1000
